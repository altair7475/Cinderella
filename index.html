<!DOCTYPE html>

<style>
@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

@keyframes fadeUp {
    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes drift{
    from{
        transform:translate(0,0);
    }
    to {
        transform:translate(250px, 250px);
    }
}

body{
    font-family:Garamond, serif;
    margin:0;
    background-color:#F5FAFD;
    color:#333;
    animation: fadeIn 1s ease-out;
}

body{
    font-family:Garamond, serif;
    margin: 0;
    color: #333;
    overflow-x: hidden;
    background:
        radial-gradient(circle at top, #f5fdfc  0%, #f5fafd 35%, #F5F6FD 100%);
}

body::before{
    content:"";
    position:fixed;
    inset:-50%;
    z-index: -1;
    background:repeating-linear-gradient(
        45deg,
        rgba(142, 142, 142, 0.1) 0px,
        rgba(142, 142, 142, 0.1) 2px,
        transparent 2px,
        transparent 80px
    );
    animation:drift 25s linear infinite
}



header{
background:linear-gradient(to right,#222f5b,#0e1a40);
color:white;
text-align:left;
padding:15px 20px;
display:flex;
align-items:center;
gap:50px;
}


header h2,
header h3,
header h4,

font-size: 25px;
}

header h1{

font-size: 40px;

.main{

}

.main h1{

}


.main p{

}

.button{

    padding:15px 30px;

    z-index: 1;
    animation: fadeUp 1s ease-out;
}

.button:hover{
    background-color:#4F81BD;
}

</style>
