<style>

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

@keyframes fadeInSnow {
    from{
        opacity:0;
        transform:translate(-50%, -55%);
    }
    to{
        opacity:0.2;
        transform:translate(-50%, -43%);
    }
}

@keyframes fadeUp {
    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}
