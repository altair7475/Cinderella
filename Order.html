<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order</title>
    <link rel="icon" type="crown" href="crown.png">
</head>
<style>

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

@keyframes fadeUp {
    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

body{
    font-family:Garamond, serif;
    margin:0;
    background-color:#F5FAFD;
    color:#333;
    animation: fadeIn 1s ease-out;
}


header{
background:linear-gradient(to right,#222f5b,#0e1a40);
color:white;
text-align:left;
padding:15px 20px;
display:flex;
align-items:center;
gap:50px;
flex-wrap:wrap;
}


header h2,
header h3,
header h4,
header h5{
margin:0;
font-size: 25px;
}

header h1{
margin: 0;
font-size: 40px;
flex:0.48;
}
</style>

<header>
    <h1>Cinderella</h1>
    <h2><a href="index.html" style="color: aliceblue; text-decoration: none;">Home</a></h2>
    <h3><a href="Products.html" style="color: aliceblue; text-decoration: none;">Products</a></h3>
    <h4><a href="ContactUs.html" style="color: aliceblue; text-decoration: none;">Contact Us</a></h4>
    <h5><a href="AboutUs.html" style="color: aliceblue; text-decoration: none;">About Us</a></h5>
</header>

<!--Top stuff done by Haysab to make website more appealing-->
<!--Everything below was done by Rayner-->


<form action="thankyou.html" method="get">

    <h2>Place Your Order</h2>

    <label for="name">Full Name:</label><br>
    <input type="text" id="name" name="name" size="30" required>
    <br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" size="30" required>
    <br><br>

    <label for="phone">Phone Number:</label><br>
    <input type="tel" id="phone" name="phone" size="30">
    <br><br>

    <label for="plushie">Choose a Plushie:</label><br>
    <select name="plushie" id="plushie">
        <option value="snorlax">Snorlax</option>
        <option value="sharko">Sharko</option>
        <option value="glock">Glock (Fake)</option>
        <option value="mimikyu">Mimikyu</option>
        <option value="ariiq">Ariiq Body Pillow</option>
        <option value="pigeon">Pigeon</option>
        <option value="red panda">Red Panda</option>
    </select>
    <br><br>

    <label for="quantity">Quantity:</label><br>
    <input type="number" id="quantity" name="quantity" min="1" max="10" value="" required >
    <br><br>

    <label>Delivery Method:</label><br>
    <input type="radio" id="delivery" name="delivery" value="Delivery" required >
    <label for="delivery">Home Delivery</label>

    <input type="radio" id="pickup" name="delivery" value="Pickup">
    <label for="pickup">Self Collection</label>
    <br><br>

    <label>Payment Method:</label><br>
    <input type="radio" id="card" name="payment" value="Card" required >
    <label for="card">Credit/Debit Card</label>

    <input type="radio" id="paynow" name="payment" value="PayNow">
    <label for="paynow">PayNow</label>

    <input type="radio" id="cash" name="payment" value="Cash">
    <label for="cash">Cash on Delivery</label>
    <br><br>

    <label for="address">Delivery Address:</label><br>
    <textarea id="address" name="address" rows="4" cols="40" required ></textarea>
    <br><br>

    <label for="remarks">Special Requests:</label><br>
    <textarea id="remarks" name="remarks" rows="4" cols="40" placeholder="Gift wrapping, message, etc."></textarea>
    <br><br>

    <input type="checkbox" id="agree" name="agree" required>
    <label for="agree">I agree to the terms and conditions.</label>
    <br><br>

    <input type="submit" value="Place Order">
    <input type="reset" value="Clear Form">
</form>
</html>
